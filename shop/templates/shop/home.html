<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учебная витрина видеокарт</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f6f7fb;
      color: #202124;
    }
    h1 { font-weight: 600; margin-bottom: .5rem; }
    .note {
      padding: 1rem;
      background: #fff8df;
      border-left: 5px solid #f0b429;
      border-radius: 8px;
      margin: 1rem 0 1.5rem;
    }
    .product {
      background: white;
      border: 1px solid #e6e8ef;
      border-radius: 12px;
      padding: 1rem;
      margin: .75rem 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .name { font-size: 1.1rem; font-weight: 700; }
    .price { font-weight: 700; color: #005EB8; margin: .35rem 0; }
    .loading { color: #777; }
    .footer { margin-top: 2rem; font-size: .9rem; color: #777; }
  </style>
</head>
<body>
  <h1>Учебная витрина видеокарт</h1>

  <div class="note">
    <strong>Дисклеймер:</strong> это учебный проект для демонстрации Django, Django Ninja,
    HTMX, Docker, PostgreSQL и CI/CD. Товары, цены и описания являются тестовыми.
    Продажа товаров не осуществляется.
  </div>

  <div hx-get="/partials/products/" hx-trigger="load" hx-swap="innerHTML" class="loading">
    Загрузка товаров…
  </div>

  <div class="footer">
    API: <code>/api/products</code> · Health: <code>/api/health</code> · Docs: <code>/api/docs</code>
  </div>
</body>
</html>
